<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VR Space Station – Hand Tracking & Teleportation</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #000; overflow: hidden; }
      canvas { display: block; }
      #info {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.45);
        font: 12px/1.8 monospace;
        text-align: center;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <script type="module" src="./main.js"></script>
    <div id="info">
      Desktop: drag to orbit &nbsp;|&nbsp;
      VR Controllers: grip (squeeze) to aim · release to teleport &nbsp;|&nbsp;
      Hands: point index finger at floor · pinch to teleport
    </div>
  </body>
</html>
